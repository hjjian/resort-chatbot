name: Keep Streamlit App Alive

on:
  schedule:
    # 매 6시간마다 실행 (UTC 기준 0, 6, 12, 18시)
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # 수동 실행도 가능하게

jobs:
  wake_up:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          echo "앱 깨우는 중..."
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" \
            --max-time 60 \
            ${{ secrets.APP_URL }}
          echo "완료!"
